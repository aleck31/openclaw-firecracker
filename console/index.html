<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenClaw Management Console</title>
<link rel="stylesheet" href="style.css">
<script src="config.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body x-data="app()" x-init="init()">
<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <symbol id="i-refresh" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></symbol>
  <symbol id="i-download" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></symbol>
  <symbol id="i-brain" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z"/><path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 12 18Z"/><path d="M15 13a4.5 4.5 0 0 1-3-4 4.5 4.5 0 0 1-3 4"/><path d="M17.599 6.5a3 3 0 0 0 .399-1.375"/><path d="M6.003 5.125A3 3 0 0 0 6.401 6.5"/><path d="M3.477 10.896a4 4 0 0 1 .585-.396"/><path d="M19.938 10.5a4 4 0 0 1 .585.396"/><path d="M6 18a4 4 0 0 1-1.967-.516"/><path d="M19.967 17.484A4 4 0 0 1 18 18"/></symbol>
  <symbol id="i-terminal" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></symbol>
  <symbol id="i-dashboard" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></symbol>
  <symbol id="i-globe" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></symbol>
  <symbol id="i-pause" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></symbol>
  <symbol id="i-power" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></symbol>
  <symbol id="i-play" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></symbol>
  <symbol id="i-rotate-ccw" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></symbol>
  <symbol id="i-trash" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></symbol>
  <symbol id="i-x" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></symbol>
  <symbol id="i-zap" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></symbol>
  <symbol id="i-link" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></symbol>
</svg>

<!-- Header -->
<div class="header">
  <h1>OpenClaw Management Console</h1>
  <span class="status-dot" :class="connected ? 'ok' : 'err'"></span>
  <span class="status-label" x-text="connected ? 'Connected' : 'Disconnected'"></span>
  <button class="btn btn-outline" @click="refresh()" :disabled="loadingHosts||loadingTenants">
    Refresh <span :class="(loadingHosts||loadingTenants) && 'spin'"><svg class="icon s13"><use href="#i-refresh"/></svg></span>
  </button>
  <input type="text" x-model="apiUrl" @change="saveSettings(); refresh()" placeholder="https://api.example.com/v1/">
  <input type="password" x-model="apiKey" @change="saveSettings(); refresh()" placeholder="🔒 API Key" style="width:200px">
</div>

<!-- Main -->
<div class="main">

  <!-- Hosts -->
  <div class="hosts-panel">
    <div class="panel-header">
      <span class="panel-title">Hosts (Group)</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px;padding:0 4px 6px;font-size:12px">
      <span style="color:var(--gray)" x-text="'Latest rootfs: '+(rootfsVersion||'…')"></span>
      <button class="btn-act" title="Pull latest rootfs to all hosts" @click="refreshRootfs()"><svg class="icon s13"><use href="#i-download"/></svg></button>
    </div>
    <template x-if="hosts.length === 0 && !loadingHosts">
      <div class="empty">No hosts</div>
    </template>
    <template x-for="h in hosts" :key="h.instance_id">
      <div class="host-card" :class="selectedHost === h.instance_id && 'selected'"
           @click="selectedHost = selectedHost === h.instance_id ? null : h.instance_id">
        <div class="host-top">
          <span class="host-id" x-text="h.instance_id"></span>
          <span class="badge" :class="h.status==='active' ? 'badge-active' : 'badge-inactive'" x-text="h.status"></span>
        </div>
        <div class="host-row">
          <span class="host-label">CPU<span class="overcommit-badge" x-show="(h.cpu_overcommit_ratio||1) > 1" x-text="' (×'+(h.cpu_overcommit_ratio||1)+')'"></span></span>
          <div class="bar-bg" style="position:relative">
            <div class="bar-fill" :class="cpuBarClass(h)" :style="'width:'+cpuPct(h)+'%'"></div>
            <template x-if="(h.cpu_overcommit_ratio||1) > 1">
              <div class="bar-physical-mark" :style="'left:'+(100/(h.cpu_overcommit_ratio||1))+'%'"></div>
            </template>
          </div>
          <span class="host-val" x-text="h.used_vcpu+'/'+h.total_vcpu"></span>
        </div>
        <div class="host-row">
          <span class="host-label">Mem(GB)</span>
          <div class="bar-bg"><div class="bar-fill bar-mem" :style="'width:'+memPct(h)+'%'"></div></div>
          <span class="host-val" x-text="(h.used_mem_mb/1024).toFixed(1)+'/'+(h.total_mem_mb/1024).toFixed(1)"></span>
        </div>
        <div class="host-row">
          <span class="host-label">VM</span>
          <span style="color:#fff" x-text="h.vm_count"></span>
          <span style="margin-left:auto;font-size:11px;color:var(--gray)" x-text="h.rootfs_version||''"></span>
        </div>
      </div>
    </template>
  </div>

  <!-- Tenants -->
  <div class="tenants-panel">

    <!-- AgentCore status mini-panel -->
    <template x-if="agentcoreStatus.enabled">
      <div style="margin-bottom:12px;padding:8px 12px;border:1px solid #0f83;border-radius:6px;background:var(--panel)">
        <span style="font-size:13px;color:var(--green)">⚡ AgentCore</span>
        <span style="font-size:11px;color:var(--gray)">enabled</span>
        <a :href="'https://'+agentcoreRegion+'.console.aws.amazon.com/cloudwatch/home?region='+agentcoreRegion+'#dashboards'" target="_blank" style="font-size:11px;color:var(--cyan);margin-left:8px">📊 CloudWatch</a>
      </div>
    </template>

    <!-- Skills mini-panel -->
    <div style="margin-bottom:12px;padding:8px 12px;border:1px solid var(--border);border-radius:6px;background:var(--panel)">
      <span style="font-size:13px;color:var(--cyan)"><svg class="icon s14" style="vertical-align:-2px"><use href="#i-brain"/></svg> Shared Skills</span>
      <span style="font-size:11px;color:var(--gray)" x-text="'('+skills.length+')'"></span>
      <template x-for="s in skills" :key="s.id">
        <span style="display:inline-block;margin:4px 4px 0 0;padding:2px 8px;border:1px solid var(--border);border-radius:10px;font-size:11px;color:var(--text)" x-text="s.title"></span>
      </template>
    </div>

    <div class="panel-header">
      <span class="panel-title">Tenants <template x-if="selectedHost"><span style="font-size:12px;color:var(--cyan-dim)">— <span x-text="selectedHost"></span> <button class="btn-icon" @click="selectedHost=null" style="font-size:12px"><svg class="icon s12"><use href="#i-x"/></svg></button></span></template></span>
      <div style="display:flex;gap:10px;align-items:center">
        <button class="btn btn-cyan" @click="showModal=true">New Tenant</button>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th><th>Name</th><th>Status</th><th>vCPU</th><th>Mem (MB)</th><th>Guest IP</th>
            <th>Port</th><th>Host ID</th><th>Rootfs</th><th>Model</th><th>VM Health</th><th>Gateway</th><th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <template x-if="filteredTenants.length === 0 && !loadingTenants">
            <tr><td colspan="11" class="empty">No tenants</td></tr>
          </template>
          <template x-for="t in filteredTenants" :key="t.id">
            <tr>
              <td x-text="t.id"></td>
              <td x-text="t.name || '-'"></td>
              <td><span class="badge" :class="'badge-'+t.status" x-text="t.status"></span></td>
              <td x-text="t.vcpu"></td>
              <td x-text="t.mem_mb"></td>
              <td x-text="t.guest_ip || '-'"></td>
              <td x-text="t.host_port || '-'"></td>
              <td x-text="(t.host_id||'').substring(0,12)+'…'"></td>
              <td style="font-size:11px;color:var(--gray)" x-text="t.rootfs_version||'-'"></td>
              <td style="font-size:11px;color:var(--cyan-dim)" x-text="tenantModels[t.id]||'-'"></td>
              <td><span class="health-dot" :class="healthClass(t.vm_health)"></span></td>
              <td><span class="health-dot" :class="healthClass(t.app_health)"></span></td>
              <td>
                <div class="act-group">
                  <button class="btn-act" title="oc-connect.sh command" @click="copyCmd('./scripts/oc-connect.sh '+t.id)"><svg class="icon s13"><use href="#i-terminal"/></svg></button>
                  <button class="btn-act" title="oc-dashboard.sh command" @click="copyCmd('./scripts/oc-dashboard.sh '+t.id)"><svg class="icon s13"><use href="#i-dashboard"/></svg></button>
                  <template x-if="t.status==='running'">
                    <a class="btn-act" :href="(window.OC_DASHBOARD_BASE||'')+'/vm/'+t.id+'/'+(t.gateway_token?'?token='+t.gateway_token:'')" target="_blank" title="Open Dashboard"><svg class="icon s13"><use href="#i-globe"/></svg></a>
                  </template>
                  <template x-if="t.status==='running'">
                    <span>
                      <button class="btn-act" title="Pause" @click="tenantAction(t.id,'pause')"><svg class="icon s13"><use href="#i-pause"/></svg></button>
                      <button class="btn-act" title="Stop" @click="tenantAction(t.id,'stop')"><svg class="icon s13"><use href="#i-power"/></svg></button>
                      <button class="btn-act" title="Restart" @click="tenantAction(t.id,'restart')"><svg class="icon s13"><use href="#i-zap"/></svg></button>
                    </span>
                  </template>
                  <template x-if="t.status==='stopped'">
                    <span>
                      <button class="btn-act" title="Start" @click="tenantAction(t.id,'start')"><svg class="icon s13"><use href="#i-play"/></svg></button>
                      <button class="btn-act" title="Reset rootfs" @click="tenantAction(t.id,'reset')"><svg class="icon s13"><use href="#i-rotate-ccw"/></svg></button>
                    </span>
                  </template>
                  <template x-if="t.status==='paused'">
                    <button class="btn-act" title="Resume" @click="tenantAction(t.id,'resume')"><svg class="icon s13"><use href="#i-play"/></svg></button>
                  </template>
                  <button class="btn-del" @click="deleteTenant(t.id)"><svg class="icon s13"><use href="#i-trash"/></svg></button>
                </div>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Create Tenant Modal -->
<template x-if="showModal">
  <div class="overlay" @click.self="showModal=false">
    <div class="modal">
      <button class="close-btn" @click="showModal=false"><svg class="icon s16"><use href="#i-x"/></svg></button>
      <h2>New Tenant</h2>
      <label>Name <span class="req">*</span></label>
      <input type="text" x-model="form.name" placeholder="e.g. my-tenant" @keydown.enter="createTenant()">
      <label>vCPU <span class="opt">optional</span></label>
      <input type="number" x-model.number="form.vcpu" placeholder="2">
      <label>Memory (MB) <span class="opt">optional</span></label>
      <input type="number" x-model.number="form.memory_mb" placeholder="4096">
      <div class="modal-actions">
        <button class="btn btn-cyan" @click="showModal=false">Cancel</button>
        <button class="btn btn-create" @click="createTenant()" :disabled="!form.name">Create</button>
      </div>
    </div>
  </div>
</template>

<script>
function app() {
  return {
    apiUrl: '', apiKey: '', connected: false, toast: '',
    hosts: [], tenants: [], selectedHost: null, rootfsVersion: '',
    loadingHosts: false, loadingTenants: false,
    showModal: false,
    skills: [], tenantModels: {},
    agentcoreStatus: { enabled: false }, agentcoreRegion: 'ap-northeast-1',
    form: { name: '', vcpu: null, memory_mb: null },

    init() {
      this.apiUrl = localStorage.getItem('oc_api_url') || window.OC_DEFAULT_API_URL || '';
      this.apiKey = localStorage.getItem('oc_api_key') || window.OC_DEFAULT_API_KEY || '';
      if (this.apiUrl && this.apiKey) this.refresh();
    },
    saveSettings() {
      localStorage.setItem('oc_api_url', this.apiUrl);
      localStorage.setItem('oc_api_key', this.apiKey);
    },
    async api(method, path, body) {
      const url = this.apiUrl.replace(/\/+$/, '') + '/' + path.replace(/^\/+/, '');
      const opts = { method, headers: { 'x-api-key': this.apiKey, 'Content-Type': 'application/json' } };
      if (body) opts.body = JSON.stringify(body);
      const r = await fetch(url, opts);
      this.connected = r.ok;
      return r.json();
    },
    async refresh() {
      await Promise.all([this.loadHosts(), this.loadTenants()]);
    },
    async loadHosts() {
      if (!this.apiUrl || !this.apiKey) return;
      this.loadingHosts = true;
      try { this.hosts = await this.api('GET', 'hosts'); this.connected = true; }
      catch { this.connected = false; }
      this.loadingHosts = false;
      try { this.rootfsVersion = (await this.api('GET', 'hosts/rootfs-version')).version; } catch {}
      try { this.agentcoreStatus = await this.api('GET', 'agentcore/status'); } catch {}
      // Load skills and tenant models from router API
      try {
        const base = window.location.origin;
        const sk = await fetch(base + '/api/skills').then(r=>r.json());
        this.skills = sk.skills || [];
        const tm = await fetch(base + '/api/tenants').then(r=>r.json());
        this.tenantModels = {};
        for (const [tid, info] of Object.entries(tm.tenants || {})) {
          this.tenantModels[tid] = (info.model || '').split('/').slice(-1)[0] || '?';
        }
      } catch {}
    },
    async loadTenants() {
      if (!this.apiUrl || !this.apiKey) return;
      this.loadingTenants = true;
      try { this.tenants = await this.api('GET', 'tenants'); this.connected = true; }
      catch { this.connected = false; }
      this.loadingTenants = false;
    },
    async createTenant() {
      if (!this.form.name) return;
      const body = { name: this.form.name };
      if (this.form.vcpu) body.vcpu = this.form.vcpu;
      if (this.form.memory_mb) body.mem_mb = this.form.memory_mb;
      await this.api('POST', 'tenants', body);
      this.form = { name: '', vcpu: null, memory_mb: null };
      this.showModal = false;
      this.loadTenants();
    },
    async deleteTenant(id) {
      if (!confirm('Delete tenant ' + id + '?')) return;
      await this.api('DELETE', 'tenants/' + id);
      this.loadTenants();
    },
    async tenantAction(id, action) {
      this.toast = action + '…';
      await this.api('POST', 'tenants/' + id + '/' + action);
      this.toast = '✓ ' + action;
      setTimeout(() => this.toast = '', 2000);
      this.loadTenants();
    },
    async refreshRootfs() {
      if (!confirm('Pull latest rootfs to all hosts?')) return;
      this.toast = 'refresh-rootfs…';
      await this.api('POST', 'hosts/refresh-rootfs');
      this.toast = '✓ refresh-rootfs sent';
      setTimeout(() => this.toast = '', 3000);
    },
    copyCmd(cmd) {
      navigator.clipboard.writeText(cmd);
      this.toast = '✓ Copied: ' + cmd;
      setTimeout(() => this.toast = '', 2000);
    },
    cpuPct(h) {
      const ratio = h.cpu_overcommit_ratio || 1;
      const allocatable = h.total_vcpu * ratio;
      return allocatable ? Math.min(100, Math.round(h.used_vcpu / allocatable * 100)) : 0;
    },
    cpuBarClass(h) {
      return h.used_vcpu > h.total_vcpu ? 'bar-cpu-over' : 'bar-cpu';
    },
    memPct(h) { return h.total_mem_mb ? Math.round(h.used_mem_mb / h.total_mem_mb * 100) : 0; },
    healthClass(v) { return v === 'up' ? 'health-up' : v === 'down' ? 'health-down' : 'health-unknown'; },
    get filteredTenants() { return this.selectedHost ? this.tenants.filter(t => t.host_id === this.selectedHost) : this.tenants; },
  };
}
</script>
<div class="toast" x-show="toast" x-transition x-text="toast"></div>
<footer class="footer" x-data>
  <span>OpenClaw</span> <span x-text="'v' + (window.OC_VERSION || 'dev')"></span>
</footer>
</body>
</html>
